                    title={bookmarks[t.id] ? "Remove bookmark" : "Bookmark"}
                    style={{ background: "transparent", border: "none", color: bookmarks[t.id] ? "#FFD700" : "#666",
                              fontSize: "0.95rem", cursor: "pointer", padding: 0, lineHeight: 1 }}>
                    {bookmarks[t.id] ? "★" : "☆"}
                  </button>
                </div>
                {searchActive && (
                  <div style={{ fontSize: "0.7rem", color: "#666", fontFamily: "monospace" }}>
                    in {t.sectionName}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TopicReader({ topic, isBookmarked, onToggleBookmark, onBack }) {
      return (
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: "0.9rem", flexWrap: "wrap" }}>
            <button onClick={onBack} style={{
              background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)",
              color: "#a8b8d0", padding: "0.35rem 0.7rem", borderRadius: 6,
              cursor: "pointer", fontSize: "0.78rem", fontFamily: "monospace",
            }}>← Topics</button>
            <h2 style={{ margin: 0, fontSize: "1.15rem", color: "#fff", fontWeight: 700, flex: 1, minWidth: 0 }}>
              {topic.name}
            </h2>
            <button onClick={onToggleBookmark} title={isBookmarked ? "Remove bookmark" : "Bookmark"}
              style={{
                background: isBookmarked ? "rgba(255,215,0,0.1)" : "rgba(255,255,255,0.04)",
                border: `1px solid ${isBookmarked ? "rgba(255,215,0,0.4)" : "rgba(255,255,255,0.1)"}`,
                color: isBookmarked ? "#FFD700" : "#a8b8d0",
                padding: "0.35rem 0.7rem", borderRadius: 6,
                cursor: "pointer", fontSize: "0.85rem",
              }}>
              {isBookmarked ? "★ Saved" : "☆ Bookmark"}
            </button>
          </div>
          <MarkdownLite content={topic.content} />
        </div>
      );
    }

    // -------- shared atoms --------
    function Card({ children }) {
      return (
        <div style={{
          background: "#1a1a24", border: "1px solid rgba(255,255,255,0.07)",
          borderRadius: 10, padding: "1.4rem", marginBottom: "1.2rem",
        }}>{children}</div>
      );
    }
    function SectionLabel({ children }) {
      return (
        <div style={{
          fontSize: "0.68rem", letterSpacing: "0.15em", color: "#666",
          textTransform: "uppercase", fontFamily: "monospace", marginBottom: "0.9rem",
        }}>{children}</div>
      );
    }
    function Stat({ label, value, sub, color }) {
      return (
        <div style={{
          background: "#1a1a24", border: "1px solid rgba(255,255,255,0.07)",
          borderRadius: 8, padding: "0.8rem 1rem", flex: "1 1 130px", minWidth: 130,
        }}>
          <div style={{ fontSize: "0.62rem", letterSpacing: "0.12em", textTransform: "uppercase",
                         color: "#777", fontFamily: "monospace" }}>{label}</div>
          <div style={{ fontSize: "1.4rem", fontWeight: 700, color, marginTop: 4 }}>{value}</div>
          {sub && <div style={{ fontSize: "0.72rem", color: "#888", marginTop: 2 }}>{sub}</div>}
        </div>
      );
    }
    const pillBtn = color => ({
      background: `${color}22`, border: `1px solid ${color}55`, color, fontSize: "0.7rem",
      padding: "0.25rem 0.6rem", borderRadius: 4, cursor: "pointer", fontFamily: "monospace",
    });
    const navBtn = (disabled, color = "#888") => ({
      background: disabled ? "none" : `${color}22`,
      border: `1px solid ${disabled ? "rgba(255,255,255,0.1)" : color + "55"}`,
      color: disabled ? "#333" : color,
      padding: "0.5rem 1.1rem", borderRadius: 5,
      cursor: disabled ? "not-allowed" : "pointer",
      fontSize: "0.78rem", fontFamily: "monospace",
    });

    // -------- root --------
    function App() {
      const [hoursPerWeek, setHoursPerWeek] = useState(() => {
        const saved = +localStorage.getItem("mrcp_hours_per_week");
        return saved >= 3 && saved <= 40 ? saved : 14;
      });
      const [view, setView] = useState(() => localStorage.getItem("mrcp_view") || "today");
      const [statuses, setStatuses] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mrcp_statuses") || "{}"); } catch { return {}; }
      });
      const [activeSpecialty, setActiveSpecialty] = useState(() =>
        localStorage.getItem("mrcp_active_specialty") || "cardiology"
      );
      const [notes, setNotes] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mrcp_notes") || "{}"); } catch { return {}; }
      });
      const [statusChangedAt, setStatusChangedAt] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mrcp_status_changed_at") || "{}"); } catch { return {}; }
      });
      const [notebookBookmarks, setNotebookBookmarks] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mrcp_notebook_bookmarks") || "{}"); } catch { return {}; }
      });
      const [activeNotebookSectionId, setActiveNotebookSectionId] = useState(() =>
        localStorage.getItem("mrcp_notebook_section") || (window.NOTEBOOK?.sections?.[0]?.id || "haematology")
      );
      const [activeTopicId, setActiveTopicId] = useState(null);

      // ---- sync state ----
      const [syncCode, setSyncCodeState] = useState(() => localStorage.getItem("mrcp_sync_code") || null);
      const [syncStatus, setSyncStatus] = useState(() =>
        FIRESTORE ? (localStorage.getItem("mrcp_sync_code") ? "connecting" : "idle") : "disabled"
      );
      const [lastSyncAt, setLastSyncAt] = useState(null);
      const [showSyncModal, setShowSyncModal] = useState(false);

      // Refs to prevent write-loops when applying remote snapshots
      const applyingRemote = useRef(false);
      const initialUploadDone = useRef(false);
      const writeTimer = useRef(null);

      const setSyncCode = useCallback(code => {
        if (code) {
          localStorage.setItem("mrcp_sync_code", code);
          initialUploadDone.current = false;
          setSyncCodeState(code);
        } else {
          localStorage.removeItem("mrcp_sync_code");
          initialUploadDone.current = false;
          setSyncCodeState(null);
          setSyncStatus(FIRESTORE ? "idle" : "disabled");
        }
      }, []);

      // Persist local state
      useEffect(() => { localStorage.setItem("mrcp_hours_per_week", hoursPerWeek); }, [hoursPerWeek]);
      useEffect(() => { localStorage.setItem("mrcp_view", view); }, [view]);
      useEffect(() => { localStorage.setItem("mrcp_statuses", JSON.stringify(statuses)); }, [statuses]);
      useEffect(() => { localStorage.setItem("mrcp_active_specialty", activeSpecialty); }, [activeSpecialty]);
      useEffect(() => { localStorage.setItem("mrcp_status_changed_at", JSON.stringify(statusChangedAt)); }, [statusChangedAt]);
      useEffect(() => { localStorage.setItem("mrcp_notebook_bookmarks", JSON.stringify(notebookBookmarks)); }, [notebookBookmarks]);
      useEffect(() => { localStorage.setItem("mrcp_notebook_section", activeNotebookSectionId); }, [activeNotebookSectionId]);

      const toggleBookmark = useCallback(id => {
        setNotebookBookmarks(prev => {
          const u = { ...prev };
          if (u[id]) delete u[id]; else u[id] = true;
          return u;
        });
      }, []);

      // Single status setter — updates BOTH the rating and the change timestamp.
      const setStatus = useCallback((id, newStatus) => {
        setStatuses(prev => {
          const cur = prev[id] || "none";
          if (cur === newStatus) return prev;
          const u = { ...prev };
          if (!newStatus || newStatus === "none") delete u[id]; else u[id] = newStatus;
          return u;
        });
        setStatusChangedAt(prev => {
          const u = { ...prev };
          if (!newStatus || newStatus === "none") delete u[id]; else u[id] = Date.now();
          return u;
        });
      }, []);

      // Backfill: if a condition has a status but no timestamp, stamp it now.
      // Runs whenever either map changes; safe to re-run since it's idempotent
      // once timestamps exist.
      useEffect(() => {
        if (applyingRemote.current) return;
        const missing = Object.keys(statuses).filter(
          id => statuses[id] && statuses[id] !== "none" && !statusChangedAt[id]
        );
        if (missing.length === 0) return;
        const now = Date.now();
        setStatusChangedAt(prev => {
          const u = { ...prev };
          missing.forEach(id => { if (!u[id]) u[id] = now; });
          return u;
        });
      }, [statuses, statusChangedAt]);

      // ---- Firestore: read remote, listen for changes, do initial upload if empty ----
      useEffect(() => {
        if (!FIRESTORE || !syncCode) return;
        setSyncStatus("connecting");
        const docRef = FIRESTORE.collection("sync").doc(syncCode);
        const notesRef = docRef.collection("notes");

        // online/offline indicator
        const onOnline  = () => setSyncStatus(s => s === "offline" ? "synced" : s);
        const onOffline = () => setSyncStatus("offline");
        window.addEventListener("online",  onOnline);
        window.addEventListener("offline", onOffline);

        let mainUnsub = null, notesUnsub = null;

        docRef.get({ source: "server" }).catch(() => docRef.get()).then(snap => {
          applyingRemote.current = true;
          if (snap.exists) {
            const data = snap.data() || {};
            if (typeof data.hoursPerWeek === "number") setHoursPerWeek(data.hoursPerWeek);
            if (data.statuses && typeof data.statuses === "object") setStatuses(data.statuses);
            if (data.statusChangedAt && typeof data.statusChangedAt === "object") setStatusChangedAt(data.statusChangedAt);
            if (data.notebookBookmarks && typeof data.notebookBookmarks === "object") setNotebookBookmarks(data.notebookBookmarks);
          } else {
            // First time using this code: upload current local state as the seed
            docRef.set({
              hoursPerWeek, statuses, statusChangedAt, notebookBookmarks,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            }, { merge: true }).catch(err => console.warn("seed write failed:", err));
          }
          // also pull any existing notes
          notesRef.get().then(qs => {
            if (!qs.empty) {
              const incoming = {};
              qs.forEach(d => { const v = d.data(); if (v && v.dataUrl) incoming[d.id] = v.dataUrl; });
              setNotes(prev => ({ ...prev, ...incoming }));
              try { localStorage.setItem("mrcp_notes", JSON.stringify({ ...JSON.parse(localStorage.getItem("mrcp_notes") || "{}"), ...incoming })); } catch {}
            } else if (!snap.exists) {
              // seed notes too on first time
              try {
                const localNotes = JSON.parse(localStorage.getItem("mrcp_notes") || "{}");
                Object.entries(localNotes).forEach(([id, dataUrl]) => {
                  notesRef.doc(id).set({
                    dataUrl,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                  }).catch(() => {});
                });
              } catch {}
            }
          }).finally(() => {
            applyingRemote.current = false;
            initialUploadDone.current = true;
            setLastSyncAt(Date.now());
            setSyncStatus(navigator.onLine === false ? "offline" : "synced");

            // Subscribe AFTER initial reconciliation
            mainUnsub = docRef.onSnapshot(s => {
              if (!s.exists) return;
              applyingRemote.current = true;
              const data = s.data() || {};
              if (typeof data.hoursPerWeek === "number") {
                setHoursPerWeek(prev => prev !== data.hoursPerWeek ? data.hoursPerWeek : prev);
              }
              if (data.statuses) {
                setStatuses(prev => JSON.stringify(prev) !== JSON.stringify(data.statuses) ? data.statuses : prev);
              }
              if (data.statusChangedAt) {
                setStatusChangedAt(prev => JSON.stringify(prev) !== JSON.stringify(data.statusChangedAt) ? data.statusChangedAt : prev);
              }
              if (data.notebookBookmarks) {
                setNotebookBookmarks(prev => JSON.stringify(prev) !== JSON.stringify(data.notebookBookmarks) ? data.notebookBookmarks : prev);
              }
              setLastSyncAt(Date.now());
              // unset on next tick
              setTimeout(() => { applyingRemote.current = false; }, 0);
            }, err => { console.warn("main snapshot err:", err); setSyncStatus("error"); });

            notesUnsub = notesRef.onSnapshot(qs => {
              applyingRemote.current = true;
              setNotes(prev => {
                let updated = prev;
                qs.docChanges().forEach(change => {
                  const id = change.doc.id;
                  if (change.type === "removed") {
                    if (id in updated) { updated = { ...updated }; delete updated[id]; }
                  } else {
                    const data = change.doc.data();
                    if (data && data.dataUrl && updated[id] !== data.dataUrl) {
                      updated = { ...updated, [id]: data.dataUrl };
                    }
                  }
                });
                if (updated !== prev) {
                  try { localStorage.setItem("mrcp_notes", JSON.stringify(updated)); } catch {}
                }
                return updated;
              });
              setLastSyncAt(Date.now());
              setTimeout(() => { applyingRemote.current = false; }, 0);
            }, err => console.warn("notes snapshot err:", err));
          });
        }).catch(err => {
          console.warn("Firestore initial fetch failed:", err);
          setSyncStatus("error");
        });

        return () => {
          window.removeEventListener("online",  onOnline);
          window.removeEventListener("offline", onOffline);
          if (mainUnsub) mainUnsub();
          if (notesUnsub) notesUnsub();
        };
      }, [syncCode]);

      // ---- Debounced write of state changes to Firestore ----
      useEffect(() => {
        if (!FIRESTORE || !syncCode || !initialUploadDone.current) return;
        if (applyingRemote.current) return;
        clearTimeout(writeTimer.current);
        writeTimer.current = setTimeout(() => {
          FIRESTORE.collection("sync").doc(syncCode).set({
            hoursPerWeek, statuses, statusChangedAt, notebookBookmarks,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          }, { merge: true })
            .then(() => setLastSyncAt(Date.now()))
            .catch(err => { console.warn("write failed:", err); setSyncStatus("error"); });
        }, 700);
        return () => clearTimeout(writeTimer.current);
      }, [hoursPerWeek, statuses, statusChangedAt, notebookBookmarks, syncCode]);

      const setNote = useCallback((id, dataUrl) => {
        setNotes(prev => {
          const updated = { ...prev };
          if (dataUrl) updated[id] = dataUrl; else delete updated[id];
          try {
            localStorage.setItem("mrcp_notes", JSON.stringify(updated));
          } catch (err) {
            alert("Couldn't save note — browser storage is full. Try deleting older notes.");
            return prev;
          }
          return updated;
        });
        // Mirror to Firestore (don't write if change came FROM remote)
        if (FIRESTORE && syncCode && !applyingRemote.current) {
          const noteDoc = FIRESTORE.collection("sync").doc(syncCode).collection("notes").doc(id);
          if (dataUrl) {
            noteDoc.set({
              dataUrl,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            }).then(() => setLastSyncAt(Date.now()))
              .catch(err => console.warn("note write failed:", err));
          } else {
            noteDoc.delete().then(() => setLastSyncAt(Date.now())).catch(() => {});
          }
        }
      }, [syncCode]);

      return (
        <div>
          <Header hoursPerWeek={hoursPerWeek} setHoursPerWeek={setHoursPerWeek}
                  view={view} setView={setView}
                  onOpenSync={() => setShowSyncModal(true)}
                  syncStatus={syncStatus} />
          {view === "today"   && <TodayView   hoursPerWeek={hoursPerWeek} statuses={statuses}
                                              setView={setView} setActiveSpecialty={setActiveSpecialty} />}
          {view === "plan"    && <PlanView    hoursPerWeek={hoursPerWeek}
                                              setView={setView} setActiveSpecialty={setActiveSpecialty} />}
          {view === "tracker" && <TrackerView statuses={statuses} setStatus={setStatus}
                                              statusChangedAt={statusChangedAt}
                                              activeSpecialty={activeSpecialty}
                                              setActiveSpecialty={setActiveSpecialty}
                                              notes={notes} setNote={setNote} />}
          {view === "notebook" && <NotebookView
                                              activeNotebookSectionId={activeNotebookSectionId}
                                              setActiveNotebookSectionId={setActiveNotebookSectionId}
                                              activeTopicId={activeTopicId}
                                              setActiveTopicId={setActiveTopicId}
                                              bookmarks={notebookBookmarks}
                                              toggleBookmark={toggleBookmark} />}
          {showSyncModal && (
            <SyncModal
              syncCode={syncCode}
              setSyncCode={setSyncCode}
              syncStatus={syncStatus}
              lastSyncAt={lastSyncAt}
              onClose={() => setShowSyncModal(false)}
            />
          )}
          <div style={{ textAlign: "center", padding: "1.2rem", fontSize: "0.7rem",
                        color: "#444", fontFamily: "monospace" }}>
            {syncCode
              ? <>Syncing across devices · code <span style={{ color: "#888" }}>{syncCode}</span></>
              : <>Saved locally in this browser · tap 🔄 Sync to share across devices</>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
