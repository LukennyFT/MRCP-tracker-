<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MRCP Part 1" />
  <meta name="theme-color" content="#0f0f13" />
  <title>MRCP Part 1 — Sept 2026</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E🩺%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E🩺%3C/text%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; min-height: 100vh; background: #0f0f13;
                 overscroll-behavior-y: none; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Georgia', 'Times New Roman', serif; color: #e8e4dc;
           padding-left: env(safe-area-inset-left);
           padding-right: env(safe-area-inset-right); }
    button { font-family: inherit; touch-action: manipulation; }
    input, textarea { font-family: inherit; }
    input:not([type=range]), textarea { -webkit-appearance: none; appearance: none; }
    /* Custom slider — green to the left of the thumb, dark blue to the right.
       The fill percentage is set via the --pct CSS variable inline from React. */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: transparent;
      outline: none;
      accent-color: #4A90D9;
      cursor: pointer;
      padding: 0;
      --pct: 0%;
    }
    input[type=range]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right,
        #1c4a2a 0%, #1c4a2a var(--pct),
        #1c2a4a var(--pct), #1c2a4a 100%);
    }
    input[type=range]::-moz-range-track {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right,
        #1c4a2a 0%, #1c4a2a var(--pct),
        #1c2a4a var(--pct), #1c2a4a 100%);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4A90D9;
      border: 2px solid #ffffff;
      margin-top: -6px; /* centre on 6px track */
      box-shadow: 0 0 0 1px rgba(74,144,217,0.4);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #4A90D9;
      border: 2px solid #ffffff;
      cursor: pointer;
    }
    /* Hide scrollbar in tab strip */
    .tab-strip::-webkit-scrollbar, .specialty-strip::-webkit-scrollbar { display: none; }
    .tab-strip, .specialty-strip { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    /* Touch targets ≥44px on iOS */
    @media (pointer: coarse) {
      button { min-height: 38px; }
    }
    /* iPhone — collapse the tracker sidebar into a horizontal strip */
    .tracker-sidebar { width: 200px; }
    .tracker-strip { display: none; }
    @media (max-width: 720px) {
      .tracker-sidebar { display: none; }
      .tracker-strip { display: flex; }
    }
    /* Canvas: stop the page scrolling while drawing */
    .pencil-canvas { touch-action: none; -webkit-user-select: none; user-select: none; }
    /* Pen-only mode: ignore touch on canvas (palm rejection) */
    .pencil-canvas.pen-only { touch-action: none; }
    /* Modal full-screen with safe area */
    .pencil-overlay {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/babel.min.js"></script>
  <script src="vendor/firebase-app-compat.js"></script>
  <script src="vendor/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script src="notebook-data.js"></script>
</head>
<body>
  <div id="root">
    <div style="padding:2rem;color:#888;font-family:monospace;text-align:center;">
      Loading… (first load compiles JSX in-browser, takes a couple of seconds)
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const SPECIALTIES = window.SPECIALTIES;
    const PHASES = window.PHASES;
    const TIPS = window.TIPS;
    const EXAM_DATE = new Date(window.EXAM_DATE + "T00:00:00");
    const PLAN_START = new Date(window.PLAN_START + "T00:00:00");

    // -------- Firebase init (sync across devices) --------
    let FIRESTORE = null;
    try {
      if (window.firebase && window.FIREBASE_CONFIG) {
        if (!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);
        FIRESTORE = firebase.firestore();
        // Enable offline persistence — survives airplane mode, syncs on reconnect
        FIRESTORE.enablePersistence({ synchronizeTabs: true }).catch(() => {});
      }
    } catch (err) {
      console.warn("Firebase init failed:", err);
    }

    // generate readable sync codes like  m7k3-l9xq-pd4t-r8sy
    function generateSyncCode() {
      const chars = "abcdefghjkmnpqrstuvwxyz23456789"; // unambiguous chars
      const bytes = new Uint8Array(16);
      crypto.getRandomValues(bytes);
      let s = "";
      for (let i = 0; i < 16; i++) {
        if (i > 0 && i % 4 === 0) s += "-";
        s += chars[bytes[i] % chars.length];
      }
      return s; // e.g. "m7k3-l9xq-pd4t-r8sy"
    }
    const isValidSyncCode = c =>
      typeof c === "string" && c.replace(/-/g, "").length >= 12 && c.replace(/-/g, "").length <= 32;
    const normaliseSyncCode = c => (c || "").toLowerCase().trim().replace(/[^a-z0-9-]/g, "");

    // Days since a timestamp (ms epoch). Returns whole days from today.
    function daysSince(ts) {
      if (!ts) return null;
      const now = stripTime(new Date()).getTime();
      const then = stripTime(new Date(ts)).getTime();
      return Math.max(0, Math.round((now - then) / MS_PER_DAY));
    }
    function fmtDaysShort(ts) {
      const d = daysSince(ts);
      if (d == null) return "";
      if (d === 0) return "today";
      return `${d}d`;
    }
    function fmtDaysLong(ts) {
      const d = daysSince(ts);
      if (d == null) return "";
      if (d === 0) return "today";
      if (d === 1) return "1 day";
      return `${d} days`;
    }
    function fmtSinceDate(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleDateString("en-GB", { day: "numeric", month: "short" });
    }

    const PRIORITY_COLORS = {
      HIGH: { bg: "#FEE2E2", text: "#991B1B", label: "High yield" },
      MED:  { bg: "#FEF9C3", text: "#854D0E", label: "Medium" },
      LOW:  { bg: "#F0FDF4", text: "#166534", label: "Lower yield" },
      EXAM: { bg: "#1a1a2e", text: "#ffffff", label: "EXAM DAY" },
    };

    const STATUS_CONFIG = {
      green:  { label: "Confident",      color: "#16a34a", bg: "#dcfce7", border: "#86efac" },
      yellow: { label: "Working on it",  color: "#d97706", bg: "#fef3c7", border: "#fcd34d" },
      red:    { label: "Struggling",     color: "#dc2626", bg: "#fee2e2", border: "#fca5a5" },
      none:   { label: "Not rated",      color: "#6b7280", bg: "transparent", border: "transparent" },
    };

    // -------- date / phase helpers --------
    const MS_PER_DAY = 1000 * 60 * 60 * 24;
    const stripTime = d => { const x = new Date(d); x.setHours(0,0,0,0); return x; };

    function getDaysUntilExam(today = new Date()) {
      return Math.max(0, Math.round((stripTime(EXAM_DATE) - stripTime(today)) / MS_PER_DAY));
    }
    function getCurrentWeek(today = new Date()) {
      const days = (stripTime(today) - stripTime(PLAN_START)) / MS_PER_DAY;
      if (days < 0) return 0;
      return Math.min(22, Math.floor(days / 7) + 1);
    }
    function getCurrentPhaseIndex(week) {
      const idx = PHASES.findIndex(p => week >= p.weekStart && week <= p.weekEnd);
      return idx === -1 ? (week < 1 ? 0 : PHASES.length - 1) : idx;
    }
    function phaseBaselineHours(phase) {
      return +(5 * phase.weekdayHrsBase + 2 * phase.dayOffHrsBase).toFixed(2);
    }
    function totalBaselineHours() {
      return PHASES.reduce((sum, p) => sum + phaseBaselineHours(p) * (p.weekEnd - p.weekStart + 1), 0);
    }

    // -------- Apple Pencil note canvas --------
    const PEN_COLORS = ["#1a1a2e", "#dc2626", "#2563eb", "#16a34a", "#d97706", "#7c3aed"];

    function NoteCanvas({ initialDataUrl, onSave, onClose, title }) {
      const canvasRef = useRef(null);
      const wrapRef = useRef(null);
      const [tool, setTool] = useState("pen"); // pen | highlighter | eraser
      const [color, setColor] = useState("#1a1a2e");
      const [penOnly, setPenOnly] = useState(() => localStorage.getItem("mrcp_pen_only") === "1");
      const [hasPen, setHasPen] = useState(false); // ever seen a pen pointer?
      const drawing = useRef(false);
      const lastPt = useRef(null);
      const undoStack = useRef([]); // ImageData snapshots
      const dprRef = useRef(1);
      const sizeRef = useRef({ w: 0, h: 0 });

      useEffect(() => { localStorage.setItem("mrcp_pen_only", penOnly ? "1" : "0"); }, [penOnly]);

      // Setup canvas with DPR scaling, optionally restore initial PNG
      const setupCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const wrap = wrapRef.current;
        const rect = wrap.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        dprRef.current = dpr;
        sizeRef.current = { w: rect.width, h: rect.height };
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";
        const ctx = canvas.getContext("2d");
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
        if (initialDataUrl) {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, rect.width, rect.height);
          };
          img.src = initialDataUrl;
        }
      }, [initialDataUrl]);

      useEffect(() => {
        setupCanvas();
        const onResize = () => setupCanvas();
        window.addEventListener("resize", onResize);
        window.addEventListener("orientationchange", onResize);
        return () => {
          window.removeEventListener("resize", onResize);
          window.removeEventListener("orientationchange", onResize);
        };
      }, [setupCanvas]);

      const getPos = e => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const snapshot = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
        undoStack.current.push(data);
        if (undoStack.current.length > 20) undoStack.current.shift();
      };

      const persist = () => {
        try {
          const dataUrl = canvasRef.current.toDataURL("image/png");
          onSave(dataUrl);
        } catch {}
      };

      const onPointerDown = e => {
        if (e.pointerType === "pen") setHasPen(true);
        // Palm / touch rejection: when pen-only is on AND we've seen a pen, ignore touches
        if (penOnly && hasPen && e.pointerType === "touch") return;
        if (penOnly && e.pointerType === "touch" && !hasPen) {
          // First touch when no pen seen yet — still allow but flag for user
        }
        e.preventDefault();
        try { e.target.setPointerCapture(e.pointerId); } catch {}
        snapshot();
        drawing.current = true;
        const { x, y } = getPos(e);
        lastPt.current = { x, y, pressure: e.pressure || 0.5 };
      };

      const onPointerMove = e => {
        if (!drawing.current) return;
        if (penOnly && hasPen && e.pointerType === "touch") return;
        e.preventDefault();
        const { x, y } = getPos(e);
        const ctx = canvasRef.current.getContext("2d");
        const pressure = e.pressure && e.pressure > 0 ? e.pressure : (e.pointerType === "pen" ? 0.5 : 0.6);
        let lineWidth, strokeStyle, comp = "source-over";
        if (tool === "pen") {
          lineWidth = 1 + pressure * 3.2;
          strokeStyle = color;
        } else if (tool === "highlighter") {
          lineWidth = 14;
          strokeStyle = color + "55";
        } else { // eraser
          lineWidth = 22;
          strokeStyle = "rgba(0,0,0,1)";
          comp = "destination-out";
        }
        ctx.globalCompositeOperation = comp;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = strokeStyle;
        ctx.beginPath();
        ctx.moveTo(lastPt.current.x, lastPt.current.y);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.globalCompositeOperation = "source-over";
        lastPt.current = { x, y, pressure };
      };

      const onPointerUp = e => {
        if (!drawing.current) return;
        drawing.current = false;
        lastPt.current = null;
        persist();
      };

      const undo = () => {
        const stack = undoStack.current;
        if (!stack.length) return;
        const data = stack.pop();
        const ctx = canvasRef.current.getContext("2d");
        ctx.putImageData(data, 0, 0);
        persist();
      };

      const clear = () => {
        if (!confirm("Clear all notes for this condition?")) return;
        snapshot();
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.setTransform(dprRef.current, 0, 0, dprRef.current, 0, 0);
        persist();
      };

      const toolBtn = (active, color = "#fff") => ({
        background: active ? "#2a4a8a" : "rgba(255,255,255,0.06)",
        border: `1px solid ${active ? "#4a8adc" : "rgba(255,255,255,0.15)"}`,
        color, padding: "0.5rem 0.7rem", borderRadius: 6, cursor: "pointer",
        fontSize: "0.78rem", fontFamily: "monospace", minWidth: 44, minHeight: 38,
        display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 4,
      });

      return (
        <div className="pencil-overlay" style={{
          position: "fixed", inset: 0, background: "rgba(8,8,14,0.96)", zIndex: 100,
          display: "flex", flexDirection: "column",
        }}>
          {/* Toolbar */}
          <div style={{
            padding: "0.6rem 0.75rem", display: "flex", flexWrap: "wrap",
            alignItems: "center", gap: "0.45rem",
            borderBottom: "1px solid rgba(255,255,255,0.1)", background: "#0f0f20",
          }}>
            <button onClick={() => { persist(); onClose(); }} style={toolBtn(false)} title="Close">
              ✕ Close
            </button>
            <div style={{
              fontSize: "0.78rem", color: "#9ab5cc", fontFamily: "monospace",
              flex: "1 1 140px", overflow: "hidden", textOverflow: "ellipsis",
              whiteSpace: "nowrap", padding: "0 0.4rem",
            }}>{title}</div>
            <button onClick={() => setTool("pen")}        style={toolBtn(tool === "pen", color)}        title="Pen">✏️ Pen</button>
            <button onClick={() => setTool("highlighter")} style={toolBtn(tool === "highlighter", "#d4a017")} title="Highlighter">🖍️ Hi-lite</button>
            <button onClick={() => setTool("eraser")}      style={toolBtn(tool === "eraser")}      title="Eraser">🧽 Erase</button>

            <div style={{ display: "flex", gap: 4, marginLeft: 4 }}>
              {PEN_COLORS.map(c => (
                <button key={c} onClick={() => setColor(c)} title={c} style={{
                  width: 28, height: 28, borderRadius: "50%",
                  border: color === c ? "2px solid #fff" : "1px solid rgba(255,255,255,0.2)",
                  background: c, cursor: "pointer", padding: 0,
                }} />
              ))}
            </div>

            <button onClick={undo}  style={toolBtn(false)} title="Undo last stroke">↶ Undo</button>
            <button onClick={clear} style={{ ...toolBtn(false), color: "#ffb4b4" }} title="Clear all">🗑 Clear</button>

            <label style={{
              display: "inline-flex", alignItems: "center", gap: 5, color: "#9ab5cc",
              fontSize: "0.72rem", fontFamily: "monospace", cursor: "pointer",
              padding: "0.4rem 0.6rem", border: "1px solid rgba(255,255,255,0.15)",
              borderRadius: 6, background: penOnly ? "#2a4a8a33" : "transparent",
              minHeight: 38,
            }}>
              <input type="checkbox" checked={penOnly} onChange={e => setPenOnly(e.target.checked)} />
              Pen only
            </label>
          </div>

          {/* Canvas */}
          <div ref={wrapRef} style={{
            flex: 1, background: "#fff", margin: "0.5rem", borderRadius: 8,
            overflow: "hidden", position: "relative",
            boxShadow: "0 4px 24px rgba(0,0,0,0.5)",
          }}>
            <canvas
              ref={canvasRef}
              className={"pencil-canvas" + (penOnly ? " pen-only" : "")}
              onPointerDown={onPointerDown}
              onPointerMove={onPointerMove}
              onPointerUp={onPointerUp}
              onPointerCancel={onPointerUp}
              onPointerLeave={onPointerUp}
              style={{ display: "block", width: "100%", height: "100%", background: "#fff" }}
            />
            {/* faint hint */}
            {!initialDataUrl && (
              <div style={{
                position: "absolute", top: 12, left: 14, color: "#bbb",
                fontSize: "0.78rem", pointerEvents: "none", fontFamily: "monospace",
              }}>
                ✍️ Write notes here · Apple Pencil pressure-sensitive
              </div>
            )}
          </div>

          <div style={{
            padding: "0.4rem 0.75rem 0.6rem", fontSize: "0.7rem",
            color: "#666", fontFamily: "monospace", textAlign: "center",
          }}>
            Saves automatically · {hasPen ? "Pencil detected" : "Touch / mouse input"}
          </div>
        </div>
      );
    }

    // -------- Sync modal --------
    function SyncModal({ syncCode, setSyncCode, syncStatus, lastSyncAt, onClose }) {
      const [enterCode, setEnterCode] = useState("");
      const [copied, setCopied] = useState(false);

      const generate = () => {
        if (syncCode && !confirm("Replace the current sync code with a new one? Existing remote data under the old code stays intact but this device disconnects from it.")) return;
        const code = generateSyncCode();
        setSyncCode(code);
      };
      const useExisting = () => {
        const trimmed = normaliseSyncCode(enterCode);
        if (!isValidSyncCode(trimmed)) {
          alert("Code looks too short. It should be the 16-character code from your other device (with or without dashes).");
          return;
        }
        if (!confirm("Replace this device's data with whatever is in the cloud under that code? Tip: do this on your second device, not the one with all your existing notes/progress.")) return;
        setSyncCode(trimmed);
        setEnterCode("");
      };
      const disconnect = () => {
        if (!confirm("Stop syncing across devices? Your local data stays here, but changes won't propagate.")) return;
        setSyncCode(null);
      };
      const copy = () => {
        if (!syncCode) return;
        navigator.clipboard?.writeText(syncCode).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      };

      const statusColor = {
        idle:        "#888",
        connecting:  "#E67E22",
        synced:      "#27AE60",
        offline:     "#E67E22",
        error:       "#E74C3C",
        disabled:    "#888",
      }[syncStatus] || "#888";
      const statusLabel = {
        idle:        "Local only",
        connecting:  "Connecting…",
        synced:      "Synced",
        offline:     "Offline (will sync)",
        error:       "Error",
        disabled:    "Sync unavailable",
      }[syncStatus] || syncStatus;

      const lastSyncStr = lastSyncAt ? new Date(lastSyncAt).toLocaleTimeString() : null;

      return (
        <div onClick={onClose} className="pencil-overlay" style={{
          position: "fixed", inset: 0, background: "rgba(8,8,14,0.82)",
          zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center",
          padding: "1rem",
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: "#1a1a24", border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: 12, padding: "1.4rem", width: "100%", maxWidth: 460,
            maxHeight: "90vh", overflowY: "auto",
            boxShadow: "0 8px 40px rgba(0,0,0,0.6)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <span style={{ fontSize: "1.4rem" }}>🔄</span>
              <h2 style={{ margin: 0, fontSize: "1.1rem", color: "#fff", flex: 1 }}>Sync across devices</h2>
              <button onClick={onClose} style={{
                background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.15)",
                color: "#ddd", borderRadius: 6, padding: "0.35rem 0.7rem", cursor: "pointer",
              }}>✕</button>
            </div>

            {syncStatus === "disabled" && (
              <div style={{
                background: "#3a1f1f", border: "1px solid #7a3030", color: "#ffb4b4",
                padding: "0.7rem 0.9rem", borderRadius: 8, marginBottom: 12,
                fontSize: "0.82rem", lineHeight: 1.5,
              }}>
                Firebase didn't initialize. Check that <code>vendor/firebase-app-compat.js</code>,
                {" "}<code>vendor/firebase-firestore-compat.js</code>, and <code>firebase-config.js</code> all loaded.
              </div>
            )}

            <div style={{
              background: "rgba(255,255,255,0.04)", borderRadius: 8,
              padding: "0.75rem 0.9rem", marginBottom: 14,
              display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap",
            }}>
              <span style={{
                width: 10, height: 10, borderRadius: "50%", background: statusColor,
                boxShadow: `0 0 8px ${statusColor}`,
              }} />
              <span style={{ color: "#fff", fontWeight: 600, fontSize: "0.85rem" }}>{statusLabel}</span>
              {lastSyncStr && (
                <span style={{ color: "#888", fontSize: "0.78rem", fontFamily: "monospace", marginLeft: "auto" }}>
                  Last sync: {lastSyncStr}
                </span>
              )}
            </div>

            {syncCode ? (
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: "0.7rem", color: "#888", letterSpacing: "0.1em",
                              textTransform: "uppercase", fontFamily: "monospace", marginBottom: 6 }}>
                  Your sync code
                </div>
                <div style={{
                  background: "#0f0f20", border: "1px solid #2a4a8a", borderRadius: 8,
                  padding: "0.85rem 1rem", color: "#fff", fontSize: "1.15rem",
                  fontFamily: "monospace", letterSpacing: "0.05em",
                  display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap",

                  style={{
                    flex: 1, minWidth: 180, background: "#0f0f20",

    }

    // -------- shared chrome --------

    // -------- TODAY VIEW --------
    function TodayView({ hoursPerWeek, statuses, setView, setActiveSpecialty }) {
      const today = new Date();
      const week = getCurrentWeek(today);
      const dow = today.getDay(); // 0 Sun .. 6 Sat
      const isWeekend = dow === 0 || dow === 6;

      // Pre-plan: today is before plan start.
      if (week < 1) {
        const days = Math.ceil((stripTime(PLAN_START) - stripTime(today)) / MS_PER_DAY);
        return (
          <div style={{ padding: "2rem 1.5rem", maxWidth: 900, margin: "0 auto" }}>
            <Card>
              <div style={{ fontSize: "0.7rem", color: "#666", fontFamily: "monospace", letterSpacing: "0.15em" }}>
                PLAN STARTS IN {days} DAYS
              </div>
              <p style={{ marginTop: 8, color: "#c8c4bc" }}>
                The 22-week plan begins on 21 April 2026. Use this time to set up your Anki deck and Passmedicine subscription.
              </p>
            </Card>
          </div>
        );
      }
      // After exam.
      if (today > EXAM_DATE) {
        return (
          <div style={{ padding: "2rem 1.5rem", maxWidth: 900, margin: "0 auto" }}>
            <Card>
              <div style={{ fontSize: "1.1rem", color: "#E74C3C", fontWeight: 700 }}>Exam complete.</div>
              <p style={{ color: "#c8c4bc" }}>Hopefully it went well. Onward.</p>
            </Card>
          </div>
        );
      }

      const phaseIdx = getCurrentPhaseIndex(week);
      const phase = PHASES[phaseIdx];
      const baseline = phaseBaselineHours(phase);
      const scale = hoursPerWeek / baseline;

      const weekdayHrs = phase.weekdayHrsBase * scale;
      const dayOffHrs = phase.dayOffHrsBase * scale;
      const todayHrs = isWeekend ? dayOffHrs : weekdayHrs;
      const todayQs = Math.round((isWeekend ? phase.qsPerDayOffBase : phase.qsPerWeekdayBase) * scale);

      const dayLabel = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][dow];
      const dateStr = today.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

      // Current week's systems (those whose label includes "Wk N" matching this week)
      const weekSystems = phase.systems.filter(s => systemMatchesWeek(s, week));

      // Conditions tracker stats for this phase
      const phaseTrackerIds = [...new Set(phase.systems.map(s => s.trackerId).filter(Boolean))];
      const phaseConds = phaseTrackerIds.flatMap(id => {
        const sp = SPECIALTIES.find(s => s.id === id); return sp ? sp.conditions : [];
      });
      const stats = { green: 0, yellow: 0, red: 0, none: 0 };
      phaseConds.forEach(c => stats[statuses[c.id] || "none"]++);
      const total = phaseConds.length || 1;
      const pctConfident = Math.round((stats.green / total) * 100);

      return (
        <div style={{ padding: "1.5rem", maxWidth: 1000, margin: "0 auto" }}>
          {/* Day banner */}
          <div style={{
            display: "flex", alignItems: "flex-start", gap: "1rem", flexWrap: "wrap",
            marginBottom: "1.5rem",
          }}>
            <div style={{
              background: `linear-gradient(135deg, ${phase.color}33, ${phase.color}11)`,
              border: `1px solid ${phase.color}66`,
              borderRadius: 10, padding: "1rem 1.4rem", minWidth: 220,
            }}>
              <div style={{
                fontSize: "0.65rem", color: phase.color, letterSpacing: "0.15em",
                textTransform: "uppercase", fontFamily: "monospace",
              }}>{dayLabel} · {isWeekend ? "Day off" : "Post-shift"}</div>
              <div style={{ fontSize: "1.4rem", fontWeight: 700, color: "#fff", marginTop: 4 }}>
                {dateStr}
              </div>
              <div style={{ fontSize: "0.85rem", color: "#a8b8d0", marginTop: 6 }}>
                Week <strong style={{ color: "#fff" }}>{week} of 22</strong> ·
                {" "}Phase {phase.id}: <span style={{ color: phase.color }}>{phase.name}</span>
              </div>
            </div>

            {/* Today's targets */}
            <div style={{ flex: 1, minWidth: 260, display: "flex", gap: "0.8rem", flexWrap: "wrap" }}>
              <Stat label="Today's hours" value={`${todayHrs.toFixed(1)} h`}
                    sub={isWeekend ? "Long block" : "Post-shift"} color={phase.color} />
              <Stat label="Q target" value={`${todayQs}`} sub="Passmed/Pastest" color="#27AE60" />
              <Stat label="Anki" value="Daily" sub="No skip days" color="#9B59B6" />
            </div>
          </div>

          {/* This week's focus */}
          <Card>
            <SectionLabel>This week's focus</SectionLabel>
            {weekSystems.length === 0 ? (
              <p style={{ margin: 0, color: "#888", fontSize: "0.9rem" }}>
                No specific system flagged for week {week}. Stick with the phase strategy below.
              </p>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {weekSystems.map((s, i) => {
                  const pc = PRIORITY_COLORS[s.priority];
                  const canOpen = !!s.trackerId;
                  return (
                    <div key={i} style={{
                      background: "rgba(255,255,255,0.03)",
                      borderRadius: 7, padding: "0.7rem 0.9rem",
                      borderLeft: `3px solid ${s.priority === "EXAM" ? "#E74C3C" : s.priority === "HIGH" ? "#E74C3C88" : s.priority === "MED" ? "#E67E2288" : "#27AE6088"}`,
                      display: "flex", alignItems: "center", gap: "0.7rem", flexWrap: "wrap",
                    }}>
                      <span style={{
                        background: pc.bg, color: pc.text,
                        fontSize: "0.62rem", padding: "0.18rem 0.5rem",
                        borderRadius: 3, fontFamily: "monospace", fontWeight: 700,
                      }}>{s.priority === "EXAM" ? "EXAM DAY" : pc.label.toUpperCase()}</span>
                      <span style={{ fontSize: "0.7rem", color: "#666", fontFamily: "monospace" }}>{s.weeks}</span>
                      <span style={{ flex: 1, fontSize: "0.95rem", color: "#d8d4cc" }}>{s.name}</span>
                      {canOpen && (
                        <button onClick={() => { setActiveSpecialty(s.trackerId); setView("tracker"); }}
                          style={pillBtn(phase.color)}>Open in Tracker →</button>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </Card>

          {/* Strategy */}
          <Card>
            <SectionLabel>Phase {phase.id} strategy</SectionLabel>
            <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
              {phase.strategy.map((s, i) => (
                <li key={i} style={{ display: "flex", gap: "0.8rem", marginBottom: "0.7rem" }}>
                  <span style={{ color: phase.color, fontFamily: "monospace", flexShrink: 0 }}>→</span>
                  <span style={{ color: "#b8b4ac", fontSize: "0.92rem", lineHeight: 1.6 }}>{s}</span>
                </li>
              ))}
            </ul>
          </Card>

          {/* Phase tracker progress */}
          {phaseTrackerIds.length > 0 && (
            <Card>
              <SectionLabel>Tracker progress · current phase systems</SectionLabel>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                <div style={{ fontSize: "1.5rem", fontWeight: 700, color: "#fff" }}>{pctConfident}%</div>
                <div style={{ fontSize: "0.85rem", color: "#888" }}>
                  {stats.green} of {total} conditions marked confident
                </div>
              </div>
              <div style={{ height: 8, background: "#0f0f20", borderRadius: 4, overflow: "hidden", display: "flex" }}>
                {["green","yellow","red"].map(s => stats[s] > 0 && (
                  <div key={s} style={{ width: `${(stats[s]/total)*100}%`, background: STATUS_CONFIG[s].color }} />
                ))}
              </div>
              <div style={{ display: "flex", gap: 16, marginTop: 10, fontSize: "0.78rem", flexWrap: "wrap" }}>
                {["green","yellow","red","none"].map(s => (
                  <span key={s} style={{ color: "#9ab5cc" }}>
                    <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%",
                      background: s === "none" ? "#444" : STATUS_CONFIG[s].color, marginRight: 6 }} />
                    {STATUS_CONFIG[s].label}: {stats[s]}
                  </span>
                ))}
              </div>
            </Card>
          )}
        </div>
      );
    }

    function systemMatchesWeek(system, weekNum) {
      const m = (system.weeks || "").match(/Wk(?:s)?\s*(\d+)(?:[–-](\d+))?/);
      if (!m) return false;
      const a = +m[1], b = m[2] ? +m[2] : a;
      return weekNum >= a && weekNum <= b;
    }

    // -------- PLAN VIEW --------
    function PlanView({ hoursPerWeek, setView, setActiveSpecialty, autoOpenPhase }) {
      const [activePhase, setActivePhase] = useState(autoOpenPhase ?? getCurrentPhaseIndex(getCurrentWeek()));
      const [showTips, setShowTips] = useState(false);
      const phase = PHASES[activePhase];

      const baseline = phaseBaselineHours(phase);
      const scale = hoursPerWeek / baseline;
      const weekdayHrs = phase.weekdayHrsBase * scale;
      const dayOffHrs  = phase.dayOffHrsBase * scale;
      const weekdayQs  = Math.round(phase.qsPerWeekdayBase * scale);
      const dayOffQs   = Math.round(phase.qsPerDayOffBase * scale);
      const phaseHrsPerWeek = (5*weekdayHrs + 2*dayOffHrs).toFixed(1);

      let phaseLabel, phaseColor;
      if (scale < 0.6)       { phaseLabel = "Light pace";    phaseColor = "#E74C3C"; }
      else if (scale < 0.85) { phaseLabel = "Reduced pace";  phaseColor = "#E67E22"; }
      else if (scale < 1.15) { phaseLabel = "Plan baseline"; phaseColor = "#27AE60"; }
      else                   { phaseLabel = "Above baseline"; phaseColor = "#4A90D9"; }

      return (
        <div style={{ maxWidth: 1000, margin: "0 auto" }}>
          {/* Phase tabs */}
          <div className="tab-strip" style={{
            display: "flex", borderBottom: "1px solid rgba(255,255,255,0.06)",
            overflowX: "auto", padding: "0 1rem",
          }}>
            {PHASES.map((p, i) => {
              const currentWeek = getCurrentWeek();
              const isCurrent = currentWeek >= p.weekStart && currentWeek <= p.weekEnd;
              return (
                <button key={p.id} onClick={() => setActivePhase(i)} style={{
                  background: "none", border: "none", padding: "0.9rem 1.2rem", cursor: "pointer",
                  borderBottom: activePhase === i ? `2px solid ${p.color}` : "2px solid transparent",
                  color: activePhase === i ? p.color : "#666",
                  fontSize: "0.78rem", fontFamily: "'Courier New', monospace",
                  letterSpacing: "0.05em", whiteSpace: "nowrap", position: "relative",
                }}>
                  {isCurrent && <span style={{
                    position: "absolute", top: 6, right: 6, width: 6, height: 6,
                    borderRadius: "50%", background: p.color,
                  }} />}
                  <span style={{ display: "block", fontSize: "0.62rem", marginBottom: 2, opacity: 0.7 }}>{p.label}</span>
                  {p.name}
                </button>
              );
            })}
            <button onClick={() => setShowTips(s => !s)} style={{
              marginLeft: "auto", background: "none", border: "none", padding: "0.9rem 1.2rem",
              cursor: "pointer", color: "#4A90D9", fontFamily: "monospace", fontSize: "0.78rem",
            }}>{showTips ? "▲ Hide tips" : "▼ Study tips"}</button>
          </div>

          {showTips && (
            <div style={{ padding: "1rem 1.5rem", background: "#131320", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: "0.8rem" }}>
                {TIPS.map((tip, i) => (
                  <div key={i} style={{
                    background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)",
                    borderRadius: 8, padding: "0.9rem",
                  }}>
                    <div style={{ fontSize: "1.2rem", marginBottom: 4 }}>{tip.icon}</div>
                    <div style={{ fontWeight: 600, fontSize: "0.82rem", color: "#e8e4dc", marginBottom: 4 }}>{tip.title}</div>
                    <div style={{ fontSize: "0.75rem", color: "#8a8a9a", lineHeight: 1.5 }}>{tip.body}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Phase header */}
          <div style={{ padding: "1.5rem", display: "flex", gap: "1.5rem", flexWrap: "wrap" }}>
            <div style={{
              background: `linear-gradient(135deg, ${phase.color}22, ${phase.color}11)`,
              border: `1px solid ${phase.color}44`,
              borderRadius: 10, padding: "1.2rem 1.4rem", minWidth: 200,
            }}>
              <div style={{
                fontSize: "0.62rem", color: phase.color, letterSpacing: "0.15em",
                textTransform: "uppercase", fontFamily: "monospace",
              }}>{phase.weeks}</div>
              <div style={{ fontSize: "1.3rem", fontWeight: 700, color: "#fff", marginTop: 4, lineHeight: 1.2 }}>
                Phase {phase.id}:<br/>{phase.name}
              </div>
              <div style={{ fontSize: "0.72rem", color: "#888", marginTop: 6 }}>
                {fmtRange(phase.dateStart, phase.dateEnd)}
              </div>
              <div style={{
                marginTop: 10, display: "inline-block", background: `${phaseColor}22`,
                border: `1px solid ${phaseColor}55`, borderRadius: 4,
                padding: "0.18rem 0.55rem", fontSize: "0.68rem", color: phaseColor, fontFamily: "monospace",
              }}>● {phaseLabel} · {phaseHrsPerWeek} hrs/wk</div>
            </div>

            <div style={{ flex: 1, minWidth: 240 }}>
              <SectionLabel>Phase goal</SectionLabel>
              <p style={{ margin: 0, color: "#c8c4bc", fontSize: "0.92rem", lineHeight: 1.65 }}>{phase.goal}</p>
            </div>
          </div>

          <div style={{ padding: "0 1.5rem 2rem", display: "flex", flexDirection: "column", gap: "1.2rem" }}>
            {/* Adapted weekly rhythm */}
            <Card>
              <SectionLabel>Weekly rhythm · adapted to {hoursPerWeek} hrs/wk</SectionLabel>

    function fmtRange(a, b) {

    function RhythmRow({ icon, label, hours, qs, color, suffix, baseHours, baseQs }) {

    // -------- TRACKER VIEW --------

    // Constellation (skill-tree) sub-view: same data as list mode, different visual.
    // Conditions are stars on concentric rings; tap cycles status (none → green → yellow → red → none).
    function ConstellationView({ specialty, statuses, setStatus, statusChangedAt, setHoverId, hoverId }) {
      const conditions = specialty.conditions;
      const N = conditions.length;

      // Ring layout: weight inner rings lighter so outer rings carry more nodes.
      const rings = N <= 8 ? 1 : N <= 20 ? 2 : N <= 36 ? 3 : 4;
      const counts = [];
      const weights = Array.from({ length: rings }, (_, i) => i + 1);
      const wSum = weights.reduce((a, b) => a + b, 0);
      let placed = 0;
      for (let r = 0; r < rings; r++) {
        const c = (r === rings - 1) ? (N - placed) : Math.round(N * weights[r] / wSum);
        counts.push(c);
        placed += c;
      }

      // Dynamic viewBox so dense specialties get more room.
      const VB = rings === 1 ? 900 : rings === 2 ? 1100 : rings === 3 ? 1350 : 1600;
      const CENTER = VB / 2;
      const MAX_R = VB * 0.42;
      const STAR_R = 38;

      // Ring radii: inner rings closer to centre, outer wider.
      const ringRadii = Array.from({ length: rings }, (_, r) =>
        rings === 1 ? MAX_R * 0.65 : MAX_R * (0.35 + (r * 0.6 / Math.max(1, rings - 1)))
      );

      // Compute positions
      const positions = [];
      let idx = 0;
      for (let r = 0; r < rings; r++) {
        const count = counts[r];
        const ringR = ringRadii[r];
        const angleStep = (Math.PI * 2) / count;
        // Offset alternate rings so labels stagger
        const baseAngle = -Math.PI / 2 + (r % 2 === 1 ? angleStep / 2 : 0);
        for (let i = 0; i < count; i++) {
          const angle = baseAngle + i * angleStep;
          positions.push({
            condition: conditions[idx],
            x: CENTER + Math.cos(angle) * ringR,
            y: CENTER + Math.sin(angle) * ringR,
            angle, ring: r,
          });
          idx++;
        }
      }

      // Stats
      const stats = { green: 0, yellow: 0, red: 0, none: 0 };
      conditions.forEach(c => stats[statuses[c.id] || "none"]++);
      const rated = N - stats.none;
      const pct = N ? Math.round((rated / N) * 100) : 0;

      const cycleStatus = (cid) => {
        const order = ["none", "green", "yellow", "red"];
        const cur = statuses[cid] || "none";
        setStatus(cid, order[(order.indexOf(cur) + 1) % order.length]);
      };

      // Truncate long names for labels
      const truncate = (s, n) => s.length > n ? s.slice(0, n - 1) + "…" : s;

      return (
        <div style={{
          position: "relative",
          background: "radial-gradient(ellipse at center, #0f1428 0%, #050810 100%)",
          borderRadius: 12, padding: "0.7rem",
          boxShadow: "inset 0 0 80px rgba(74, 138, 220, 0.08)",
        }}>
          {/* Decorative background stars */}
          <svg viewBox={`0 0 ${VB} ${VB}`} style={{
            width: "100%", height: "auto", display: "block",
            maxHeight: "calc(100vh - 320px)",
          }}>
            <defs>
              <radialGradient id="cg-center-glow" cx="50%" cy="50%">
                <stop offset="0%" stopColor="#4a8adc" stopOpacity={0.35} />
                <stop offset="60%" stopColor="#4a8adc" stopOpacity={0.08} />
                <stop offset="100%" stopColor="#4a8adc" stopOpacity={0} />
              </radialGradient>
              <filter id="cg-star-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="6" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>

            {/* Sparse background dots — purely decorative */}
            {Array.from({ length: 60 }).map((_, i) => {
              const seed = i * 7919;
              const bx = (seed % VB);
              const by = ((seed * 13) % VB);
              const br = ((seed % 30) > 26) ? 2.4 : 1.4;
              const op = 0.15 + ((seed % 50) / 100);
              return <circle key={`bg-${i}`} cx={bx} cy={by} r={br} fill="#cfdcec" opacity={op} />;
            })}

            {/* Centre glow */}
            <circle cx={CENTER} cy={CENTER} r={MAX_R * 1.05} fill="url(#cg-center-glow)" />

            {/* Connecting lines */}
            {positions.map(pos => (
              <line key={`line-${pos.condition.id}`}
                x1={CENTER} y1={CENTER} x2={pos.x} y2={pos.y}
                stroke="#2a4a8a" strokeWidth={1.5} strokeDasharray="4 5" opacity={0.45} />
            ))}

            {/* Ring orbit hints */}
            {ringRadii.map((rr, r) => (
              <circle key={`ring-${r}`} cx={CENTER} cy={CENTER} r={rr}
                fill="none" stroke="#1c2a4a" strokeWidth={1} strokeDasharray="2 6" opacity={0.4} />
            ))}

            {/* Centre node — specialty hub */}
            <circle cx={CENTER} cy={CENTER} r={STAR_R * 2.1}
              fill="#1a1a2e" stroke="#4a8adc" strokeWidth={3} filter="url(#cg-star-glow)" />
            <text x={CENTER} y={CENTER - 4} textAnchor="middle"
              fontSize={STAR_R * 1.4} fill="#fff" style={{ pointerEvents: "none" }}>
              {specialty.icon}
            </text>
            <text x={CENTER} y={CENTER + STAR_R * 1.2} textAnchor="middle"
              fontSize={20} fill="#9ab5cc" fontFamily="monospace" fontWeight={700}
              style={{ pointerEvents: "none" }}>
              {pct}%
            </text>
            <text x={CENTER} y={CENTER + STAR_R * 1.7} textAnchor="middle"
              fontSize={14} fill="#6b8aa6" fontFamily="monospace"
              style={{ pointerEvents: "none" }}>
              {rated}/{N}
            </text>

            {/* Stars */}
            {positions.map(pos => {
              const cid = pos.condition.id;
              const status = statuses[cid] || "none";
              const sc = STATUS_CONFIG[status];
              const isHovered = hoverId === cid;

              const fillColor = status === "none" ? "#1a1a2e" : sc.color;
              const strokeColor = status === "none" ? "#5a6a8a" : sc.color;
              const labelFill = status === "none" ? "#7a8ab0" : "#e6edf5";

              // Label position: pushed outward radially
              const labelOffsetR = STAR_R + 22;
              const labelX = pos.x + Math.cos(pos.angle) * labelOffsetR * 0.0 + 0;
              const labelY = pos.y + STAR_R + 24;

              return (
                <g key={cid} style={{ cursor: "pointer" }}
                  onClick={() => cycleStatus(cid)}
                  onMouseEnter={() => setHoverId(cid)}
                  onMouseLeave={() => setHoverId(null)}>
                  {/* Glow halo for rated stars */}
                  {status !== "none" && (
                    <circle cx={pos.x} cy={pos.y} r={STAR_R + 10}
                      fill={sc.color} opacity={isHovered ? 0.35 : 0.22} />
                  )}
                  {/* The star body */}
                  <circle cx={pos.x} cy={pos.y} r={STAR_R}
                    fill={fillColor} stroke={strokeColor} strokeWidth={4}
                    filter={status !== "none" ? "url(#cg-star-glow)" : null} />
                  {/* Tick mark inside if rated */}
                  {status !== "none" && (
                    <text x={pos.x} y={pos.y + STAR_R * 0.32} textAnchor="middle"
                      fontSize={STAR_R * 0.95} fill="#fff" fontWeight={700}
                      style={{ pointerEvents: "none" }}>✓</text>
                  )}
                  {/* Larger tap target */}
                  <circle cx={pos.x} cy={pos.y} r={STAR_R + 14}
                    fill="transparent" />
                  {/* Label below */}
                  <text x={labelX} y={labelY} textAnchor="middle"
                    fontSize={18} fill={labelFill}
                    fontFamily="'Palatino Linotype', Georgia, serif"
                    style={{ pointerEvents: "none" }}>
                    {truncate(pos.condition.name, 18)}
                  </text>
                </g>
              );
            })}
          </svg>

          {/* Floating header */}
          <div style={{
            position: "absolute", top: 14, left: 14, right: 14,
            display: "flex", justifyContent: "space-between", alignItems: "flex-start",
            pointerEvents: "none",
          }}>
            <div style={{
              background: "rgba(26, 26, 46, 0.85)",
              border: "1px solid #2a4a8a", borderRadius: 6,
              padding: "0.45rem 0.75rem", fontSize: "0.72rem",
              color: "#9ab5cc", fontFamily: "monospace",
              backdropFilter: "blur(4px)",
            }}>
              Tap a star to cycle status
            </div>
            <div style={{
              background: "rgba(26, 26, 46, 0.85)",
              border: "1px solid #2a4a8a", borderRadius: 6,
              padding: "0.45rem 0.75rem", fontSize: "0.72rem",
              color: "#cfdcec", fontFamily: "monospace",
              backdropFilter: "blur(4px)",
              display: "flex", gap: "0.8rem", alignItems: "center",
            }}>
              {["green", "yellow", "red"].map(s => (
                <span key={s} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%",
                    background: STATUS_CONFIG[s].color, boxShadow: `0 0 6px ${STATUS_CONFIG[s].color}` }} />
                  <span>{stats[s]}</span>
                </span>
              ))}
            </div>
          </div>

          {/* Hovered condition detail */}
          {hoverId && (() => {
            const c = conditions.find(x => x.id === hoverId);
            if (!c) return null;
            const status = statuses[c.id] || "none";
            const sc = STATUS_CONFIG[status];
            return (
              <div style={{
                position: "absolute", bottom: 14, left: 14, right: 14,
                background: "rgba(26, 26, 46, 0.92)",
                border: `1px solid ${status === "none" ? "#4a6a8a" : sc.color}`,
                borderRadius: 8, padding: "0.6rem 0.85rem",
                color: "#e6edf5", fontFamily: "'Palatino Linotype', Georgia, serif",
                fontSize: "0.88rem", lineHeight: 1.4,
                backdropFilter: "blur(6px)",
                pointerEvents: "none",
              }}>
                <div style={{ fontWeight: 700, marginBottom: 2 }}>{c.name}</div>
                {status !== "none" && statusChangedAt[c.id] && (
                  <div style={{ fontSize: "0.72rem", color: sc.color, fontFamily: "monospace" }}>
                    {sc.label} · {fmtDaysShort(statusChangedAt[c.id])}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      );
    }

    function TrackerView({ statuses, setStatus, statusChangedAt, activeSpecialty, setActiveSpecialty, notes, setNote }) {
      const [search, setSearch] = useState("");
      const [filterStatus, setFilterStatus] = useState("all");
      const [expandedId, setExpandedId] = useState(null);
      const [noteEditId, setNoteEditId] = useState(null);
      const [viewMode, setViewModeState] = useState(() => {
        try { return localStorage.getItem("mrcp_tracker_mode") || "list"; } catch (e) { return "list"; }
      });
      const [hoverId, setHoverId] = useState(null);
      const setViewMode = (m) => {
        setViewModeState(m);
        try { localStorage.setItem("mrcp_tracker_mode", m); } catch (e) {}
      };

      const currentSpecialty = SPECIALTIES.find(s => s.id === activeSpecialty) || SPECIALTIES[0];

      const filtered = currentSpecialty.conditions.filter(c => {
        const matchSearch = !search ||
          c.name.toLowerCase().includes(search.toLowerCase()) ||
          (c.presentation || "").toLowerCase().includes(search.toLowerCase());
        const matchFilter = filterStatus === "all" || (statuses[c.id] || "none") === filterStatus;
        return matchSearch && matchFilter;
      });

      const getStats = sp => {
        const counts = { green: 0, yellow: 0, red: 0, none: 0 };
        sp.conditions.forEach(c => counts[statuses[c.id] || "none"]++);
        return counts;
      };

      const totalStats = { green: 0, yellow: 0, red: 0, none: 0 };
      SPECIALTIES.forEach(s => {
        const stats = getStats(s);
        for (const k of Object.keys(totalStats)) totalStats[k] += stats[k];

      const totalConds = Object.values(totalStats).reduce((a, b) => a + b, 0) || 1;

      return (
        <div style={{ background: "#f8f7f4", color: "#1a1a1a", minHeight: "calc(100vh - 200px)" }}>

                ))}

          {/* Mobile: horizontal specialty strip (sidebar hidden under 720px) */}

            display: "none", overflowX: "auto", gap: 6,

    // Tiny markdown-lite renderer.
    // Supports: ## h3, ### h4, - bullets, **bold**, *italic*, `code`,
    // | tables, --- horizontal rule, > blockquote, paragraphs.
    function renderInline(text) {
      // Split on **, *, ` while preserving them; then rebuild as React nodes.
      const parts = [];
      let buf = "";
      let i = 0;
      const flush = () => { if (buf) { parts.push(buf); buf = ""; } };
      while (i < text.length) {
        if (text.startsWith("**", i)) {
          const end = text.indexOf("**", i + 2);
          if (end > -1) { flush(); parts.push(<strong key={parts.length}>{text.slice(i + 2, end)}</strong>); i = end + 2; continue; }
        }
        if (text[i] === "*") {
          const end = text.indexOf("*", i + 1);
          if (end > -1) { flush(); parts.push(<em key={parts.length}>{text.slice(i + 1, end)}</em>); i = end + 1; continue; }
        }
        if (text[i] === "`") {
          const end = text.indexOf("`", i + 1);
          if (end > -1) { flush(); parts.push(
            <code key={parts.length} style={{ background: "rgba(255,255,255,0.06)", padding: "0.1rem 0.35rem", borderRadius: 3, fontSize: "0.88em" }}>
              {text.slice(i + 1, end)}
            </code>); i = end + 1; continue; }
        }
        buf += text[i]; i++;
      }
      flush();
      return parts;
    }

    function MarkdownLite({ content }) {
      const lines = (content || "").split("\n");
      const blocks = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        // headings
        if (line.startsWith("### ")) { blocks.push({ kind: "h4", text: line.slice(4) }); i++; continue; }
        if (line.startsWith("## "))  { blocks.push({ kind: "h3", text: line.slice(3) }); i++; continue; }
        // hr
        if (line.trim() === "---")   { blocks.push({ kind: "hr" }); i++; continue; }
        // blockquote
        if (line.startsWith("> "))   { blocks.push({ kind: "quote", text: line.slice(2) }); i++; continue; }
        // table (collect contiguous | lines)
        if (line.trim().startsWith("|")) {
          const rows = [];
          while (i < lines.length && lines[i].trim().startsWith("|")) {
            rows.push(lines[i].trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim()));
            i++;
          }
          // detect separator row (all dashes)
          const sepIdx = rows.findIndex(r => r.every(c => /^[-: ]+$/.test(c)));
          let header = null, body = rows;
          if (sepIdx > 0) { header = rows.slice(0, sepIdx); body = rows.slice(sepIdx + 1); }
          blocks.push({ kind: "table", header, body });
          continue;
        }
        // bullets
        if (line.startsWith("- ") || line.startsWith("* ")) {
          const items = [];
          while (i < lines.length && (lines[i].startsWith("- ") || lines[i].startsWith("* "))) {
            items.push(lines[i].slice(2));
            i++;
          }
          blocks.push({ kind: "list", items });
          continue;
        }
        // blank line
        if (!line.trim()) { i++; continue; }
        // paragraph (collect contiguous non-blank, non-special lines)
        const paraLines = [line];
        i++;
        while (i < lines.length && lines[i].trim() &&
               !lines[i].startsWith("#") && !lines[i].startsWith("- ") &&
               !lines[i].startsWith("* ") && !lines[i].startsWith("> ") &&
               !lines[i].trim().startsWith("|") && lines[i].trim() !== "---") {
          paraLines.push(lines[i]); i++;
        }
        blocks.push({ kind: "p", text: paraLines.join(" ") });
      }

      return (
        <div style={{ fontSize: "0.92rem", lineHeight: 1.65, color: "#d8d4cc" }}>
          {blocks.map((b, idx) => {
            if (b.kind === "h3") return (
              <h3 key={idx} style={{ fontSize: "1.05rem", fontWeight: 700, color: "#fff",
                                      margin: "1.2rem 0 0.5rem", borderBottom: "1px solid rgba(255,255,255,0.08)", paddingBottom: 4 }}>
                {renderInline(b.text)}
              </h3>
            );
            if (b.kind === "h4") return (
              <h4 key={idx} style={{ fontSize: "0.92rem", fontWeight: 700, color: "#a8b8d0",
                                      margin: "0.9rem 0 0.4rem" }}>
                {renderInline(b.text)}
              </h4>
            );
            if (b.kind === "hr") return <hr key={idx} style={{ border: "none", borderTop: "1px solid rgba(255,255,255,0.1)", margin: "1rem 0" }} />;
            if (b.kind === "quote") return (
              <blockquote key={idx} style={{
                margin: "0.8rem 0", padding: "0.5rem 0.9rem", borderLeft: "3px solid #4A90D9",
                background: "rgba(74,144,217,0.06)", color: "#c8d4e0", borderRadius: "0 6px 6px 0",
                fontSize: "0.88rem",
              }}>{renderInline(b.text)}</blockquote>
            );
            if (b.kind === "list") return (
              <ul key={idx} style={{ margin: "0.4rem 0 0.8rem", paddingLeft: "1.2rem" }}>
                {b.items.map((it, j) => <li key={j} style={{ marginBottom: 4 }}>{renderInline(it)}</li>)}
              </ul>
            );
            if (b.kind === "table") return (
              <div key={idx} style={{ overflowX: "auto", margin: "0.6rem 0 0.9rem" }}>
                <table style={{ borderCollapse: "collapse", fontSize: "0.85rem", width: "100%" }}>
                  {b.header && (
                    <thead>
                      {b.header.map((row, ri) => (
                        <tr key={ri}>{row.map((c, ci) => (
                          <th key={ci} style={{
                            padding: "0.4rem 0.6rem",
                            background: "rgba(255,255,255,0.05)",
                            color: "#fff", textAlign: "left",
                            border: "1px solid rgba(255,255,255,0.08)",
                          }}>{renderInline(c)}</th>
                        ))}</tr>
                      ))}
                    </thead>
                  )}
                  <tbody>
                    {b.body.map((row, ri) => (
                      <tr key={ri}>{row.map((c, ci) => (
                        <td key={ci} style={{
                          padding: "0.4rem 0.6rem",
                          border: "1px solid rgba(255,255,255,0.08)",
                          color: "#c8c4bc", verticalAlign: "top",
                        }}>{renderInline(c)}</td>
                      ))}</tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
            return (
              <p key={idx} style={{ margin: "0.5rem 0", color: "#c8c4bc" }}>{renderInline(b.text)}</p>
            );
          })}
        </div>
      );
    }

    function NotebookView({ activeNotebookSectionId, setActiveNotebookSectionId,
                            activeTopicId, setActiveTopicId,
                            bookmarks, toggleBookmark }) {
      const [search, setSearch] = useState("");
      const [showOnlyBookmarks, setShowOnlyBookmarks] = useState(false);

      const sections = NOTEBOOK.sections || [];
      const currentSection = sections.find(s => s.id === activeNotebookSectionId) || sections[0];

      // If searching, show flat results across all sections
      const searchActive = !!search.trim() || showOnlyBookmarks;
      const allTopics = sections.flatMap(s => s.topics.map(t => ({ ...t, sectionId: s.id, sectionName: s.name, sectionIcon: s.icon })));
      const filteredAll = allTopics.filter(t => {
        const matchSearch = !search.trim() ||
          t.name.toLowerCase().includes(search.toLowerCase()) ||
          (t.content || "").toLowerCase().includes(search.toLowerCase());
        const matchBookmark = !showOnlyBookmarks || bookmarks[t.id];
        return matchSearch && matchBookmark;
      });

      const sectionTopics = currentSection ? currentSection.topics : [];

      const topicsToShow = searchActive
        ? filteredAll
        : sectionTopics.map(t => ({ ...t, sectionId: currentSection?.id, sectionIcon: currentSection?.icon }));

      const activeTopic = activeTopicId
        ? allTopics.find(t => t.id === activeTopicId)

            </div>
            <button onClick={() => setShowOnlyBookmarks(s => !s)} style={{
              background: showOnlyBookmarks ? "#2a4a8a" : "rgba(255,255,255,0.04)",
              border: `1px solid ${showOnlyBookmarks ? "#4a8adc" : "rgba(255,255,255,0.1)"}`,
              color: showOnlyBookmarks ? "#fff" : "#a8b8d0",

              fontSize: "0.78rem", fontFamily: "monospace",

              ⭐ Bookmarks {bookmarkedCount > 0 && <span style={{ opacity: 0.7 }}>({bookmarkedCount})</span>}
            </button>

              {totalCount} topics

            {/* Section sidebar (desktop) */}
            <div className="tracker-sidebar" style={{
              flexShrink: 0, background: "#0f0f20",
              borderRight: "1px solid rgba(255,255,255,0.06)", padding: "0.6rem 0",
            }}>
              {sections.map(s => {

                  <button key={s.id}
                    onClick={() => { setActiveNotebookSectionId(s.id); setActiveTopicId(null); setSearch(""); setShowOnlyBookmarks(false); }}
